name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy ExamCraft
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production

      - name: 🚀 Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/examcraft

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --production=false

            echo "🔧 Generating Prisma client..."
            npx prisma generate

            echo "🗄️ Running database migrations..."
            npx prisma migrate deploy

            echo "🏗️ Building application..."
            npm run build

            echo "♻️ Restarting with PM2..."
            pm2 describe examcraft > /dev/null 2>&1 \
              && pm2 restart examcraft \
              || pm2 start npm --name "examcraft" -- start

            pm2 save
            echo "✅ ExamCraft deployed successfully!"

      - name: 📣 Notify on Failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
